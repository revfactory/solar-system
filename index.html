<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="인터랙티브 3D 태양계 시뮬레이션" />
  <title>태양계 시뮬레이션</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="stylesheet" href="/src/styles/ui.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="app">
    <!-- 로딩 화면 -->
    <div id="loading-screen">
      <div id="loading-title">태양계</div>
      <div id="loading-bar"><div id="loading-progress"></div></div>
      <div id="loading-text">리소스 로딩 중...</div>
    </div>

    <!-- 좌측 행성 네비게이션 -->
    <nav id="navigation" class="glass-panel"></nav>

    <!-- 우측 정보 패널 -->
    <div id="info-panel" class="glass-panel"></div>

    <!-- 하단 타임라인 -->
    <div id="timeline" class="glass-panel"></div>

    <!-- 우측 상단 GitHub 링크 -->
    <a id="github-link" href="https://github.com/revfactory/space" target="_blank" rel="noopener noreferrer" title="GitHub">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>

    <!-- 좌측 하단 컨트롤 힌트 -->
    <div id="controls-hint">
      마우스 드래그: 회전 · 스크롤: 줌 · 클릭: 행성 선택
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
